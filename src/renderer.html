<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>永生计划</title>
    <link rel="stylesheet" href="./renderer.css" />
  </head>
  <body>
    <main id="stage" aria-label="Desktop pet">
      <div id="pet" role="img" aria-label="Desktop pet"></div>
      <section id="emptyState" class="empty-state hidden" aria-label="Import pet">
        <strong>No pet installed</strong>
        <span>Import a .petpack to start.</span>
        <button id="importEmptyButton" type="button">Import Petpack</button>
      </section>
      <div id="panelBackdrop" class="panel-backdrop hidden" aria-hidden="true"></div>
      <section id="panel" class="panel hidden" aria-label="Pet controls">
        <div class="panel-row">
          <label for="petSelect">Pet</label>
          <select id="petSelect"></select>
        </div>
        <div class="panel-row">
          <label for="stateSelect">State</label>
          <select id="stateSelect"></select>
        </div>
        <div class="panel-row">
          <label for="scaleRange">Scale</label>
          <input id="scaleRange" type="range" min="0.6" max="1.8" step="0.1" value="0.6" />
        </div>
        <label class="check-row">
          <input id="wanderToggle" type="checkbox" checked />
          <span>Auto wander</span>
        </label>
        <label class="check-row">
          <input id="topToggle" type="checkbox" checked />
          <span>Always on top</span>
        </label>
        <section class="app-update" aria-label="App updates">
          <div class="panel-heading">Updates</div>
          <div class="app-update-actions">
            <button id="checkUpdateButton" type="button">Check App</button>
            <button id="checkPetpackUpdatesButton" type="button">Check Pets</button>
            <button id="openDownloadsButton" type="button">Open Downloads</button>
          </div>
          <p id="updateStatus" class="update-status" aria-live="polite"></p>
        </section>
        <button id="importButton" type="button">Import Petpack</button>
        <section id="importPreview" class="import-preview hidden" aria-label="Import preview">
          <p id="importPreviewText"></p>
          <div class="import-preview-actions">
            <button id="confirmImportButton" type="button">Confirm Import</button>
            <button id="cancelImportButton" type="button">Cancel</button>
          </div>
        </section>
        <p id="petStatus" class="pet-status" aria-live="polite"></p>
        <section class="pet-manager" aria-label="Installed pets">
          <div class="panel-heading">Installed pets</div>
          <div id="petManager" class="pet-manager-list"></div>
        </section>
        <button id="quitButton" type="button">Quit</button>
      </section>
      <input id="petpackInput" class="hidden" type="file" accept=".petpack,application/zip" />
    </main>
    <script type="module" src="./renderer/index.js"></script>
  </body>
</html>
