name: Pages

on:
  push:
    branches:
      - rust-rewrite
    paths:
      - "docs/**"
      - "resources/pets/**"
      - "scripts/build-petpacks.js"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build petpacks
        run: node scripts/build-petpacks.js

      - name: Assemble site
        run: |
          mkdir -p site/petpacks
          cp docs/index.html site/index.html
          cp release/petpacks/*.petpack site/petpacks/
          cp release/petpacks/petpacks.json site/petpacks/petpacks.json

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
