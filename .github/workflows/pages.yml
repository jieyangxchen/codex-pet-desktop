name: Pages

on:
  push:
    branches:
      - rust-rewrite
    paths:
      - "docs/**"
      - "resources/pets/**"
      - "scripts/build-petpacks.js"
      - "scripts/qa-petpack-assets.js"
      - "scripts/render-download-page.js"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build petpacks
        run: node scripts/build-petpacks.js

      - name: Render download page
        run: node scripts/render-download-page.js

      - name: Assemble site
        run: |
          mkdir -p site/petpacks
          cp docs/index.html site/index.html
          cp release/petpacks/*.petpack site/petpacks/
          cp release/petpacks/petpacks.json site/petpacks/petpacks.json
          cp release/petpacks/qa.json site/petpacks/qa.json
          cp release/petpacks/visual-qa.html site/petpacks/visual-qa.html
          cp -R release/petpacks/previews site/petpacks/previews

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v5
