name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-quality-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-quality-

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run renderer, resource, page, and workflow smoke tests
        run: npm run smoke

      - name: Run Rust tests
        run: cd src-tauri && cargo test

      - name: Rebuild petpacks for release validation
        run: node scripts/build-petpacks.js

      - name: Verify generated download page smoke
        run: node src/download-page-smoke.js

  build-windows:
    needs: quality-gate
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri.exe
            src-tauri/target
          key: cargo-windows-app-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-windows-app-
            cargo-windows-

      - name: Install Tauri CLI
        shell: pwsh
        run: |
          if (Get-Command cargo-tauri -ErrorAction SilentlyContinue) {
            cargo tauri --version
          } else {
            cargo install tauri-cli --version "^2"
          }

      - name: Build app
        run: node scripts/build-app.js build windows

      - name: Rename installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets
          Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe | ForEach-Object {
            Copy-Item $_.FullName "release-assets\yongsheng-plan-windows-x64.exe"
          }

      - uses: actions/upload-artifact@v7
        with:
          name: yongsheng-plan-windows-x64
          path: release-assets/*.exe

  build-macos:
    needs: quality-gate
    runs-on: macos-latest

    env:
      MACOS_ARCH: arm64
      MACOS_TARGET: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.MACOS_TARGET }}

      - name: Cache Cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri
            src-tauri/target/${{ env.MACOS_TARGET }}
          key: cargo-macos-app-${{ env.MACOS_ARCH }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-macos-app-${{ env.MACOS_ARCH }}-
            cargo-macos-

      - name: Install Tauri CLI
        run: |
          if command -v cargo-tauri >/dev/null 2>&1; then
            cargo tauri --version
          else
            cargo install tauri-cli --version "^2"
          fi

      - name: Build app
        run: node scripts/build-app.js build macos-${{ env.MACOS_ARCH }}

      - name: Rename installer
        run: |
          mkdir -p release-assets
          cp src-tauri/target/${{ env.MACOS_TARGET }}/release/bundle/dmg/*.dmg "release-assets/yongsheng-plan-macos-${{ env.MACOS_ARCH }}.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: yongsheng-plan-macos-${{ env.MACOS_ARCH }}
          path: release-assets/*.dmg

  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/*.exe
            release-assets/*.dmg
          body: |
            先下载永生计划主程序，再从 GitHub Pages 宠物包页面下载并导入宠物。

            - `yongsheng-plan-windows-x64.exe`: Windows x64 主程序
            - `yongsheng-plan-macos-arm64.dmg`: Apple Silicon Mac 主程序
