name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [cats, tigris]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build ${{ matrix.variant }}
        run: node scripts/build-variant.js ${{ matrix.variant }} build

      - name: Rename installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets
          Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe | ForEach-Object {
            Copy-Item $_.FullName "release-assets\codex-pet-desktop-${{ matrix.variant }}-windows-x64.exe"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: codex-pet-desktop-${{ matrix.variant }}-windows-x64
          path: release-assets/*.exe

  publish:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.exe
          body: |
            Choose the Windows build you want:

            - `codex-pet-desktop-cats-windows-x64.exe`: 米粉 + 米酒
            - `codex-pet-desktop-tigris-windows-x64.exe`: Tigris Whippet
